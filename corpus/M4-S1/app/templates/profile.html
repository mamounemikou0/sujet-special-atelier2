{% extends "base.html" %}

{% block content %}
    <section class="form-container">
        <h2>Profil de {{ user.username }}</h2>
        <form action="/users/profile" method="post">
            <div class="form-group">
                <label for="username">Nom d'utilisateur :</label>
                <input type="text" id="username" name="username" value="{{ user.username }}" required>
            </div>
            <div class="form-group">
                <label for="email">Email :</label>
                <input type="email" id="email" name="email" value="{{ user.email }}" required>
            </div>
            <div class="form-group">
                <label for="new_password">Nouveau mot de passe (laisser vide pour ne pas changer) :</label>
                <input type="password" id="new_password" name="new_password">
            </div>
            <button type="submit">Mettre à jour</button>
        </form>
        <form action="/users/delete" method="post" class="delete-form">
            <button type="submit" class="delete-button">Supprimer mon compte</button>
        </form>
    </section>
{% endblock %}
