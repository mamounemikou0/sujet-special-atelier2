<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salle – RoomBook</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav id="nav"></nav>
  <main class="page">
    <div class="container">
      <div style="margin-bottom:1rem">
        <a href="/rooms" class="btn btn-outline btn-sm">← Retour aux salles</a>
      </div>
      <div class="form-card">
        <div class="card">
          <div class="card-body">
            <h1 class="page-title" id="formTitle" style="margin-bottom:1.5rem;font-size:1.4rem">Ajouter une salle</h1>

            <div id="alertBox" class="hidden"></div>

            <form method="POST" id="roomForm">
              <div class="form-group">
                <label class="form-label">Nom de la salle *</label>
                <input type="text" name="name" id="nameInput" class="form-control" placeholder="Ex: Salle Horizon" required maxlength="80">
              </div>
              <div class="form-group">
                <label class="form-label">Capacité (personnes) *</label>
                <input type="number" name="capacity" id="capacityInput" class="form-control" min="1" max="500" required placeholder="Ex: 10">
              </div>
              <div class="form-group">
                <label class="form-label">Équipements</label>
                <input type="text" name="equipment" id="equipmentInput" class="form-control" placeholder="Ex: Projecteur, Tableau blanc, Visioconférence" maxlength="255">
                <p class="form-hint">Séparés par des virgules</p>
              </div>
              <div class="form-group">
                <label class="form-label">URL de la photo</label>
                <input type="url" name="photo_url" id="photoInput" class="form-control" placeholder="https://…" maxlength="500">
                <p class="form-hint">Lien vers une image (JPG, PNG…)</p>
              </div>
              <div id="photoPreviewBox" class="hidden" style="margin-bottom:1rem">
                <img id="photoPreview" style="max-height:160px;border-radius:8px;object-fit:cover;width:100%">
              </div>
              <div class="form-actions">
                <button type="submit" class="btn btn-primary" id="submitBtn">Enregistrer la salle</button>
                <a href="/rooms" class="btn btn-outline">Annuler</a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="/js/layout.js"></script>
  <script>
    const roomId = location.pathname.match(/\/rooms\/manage\/(\d+)\/edit/)?.[1];
    const isEdit = !!roomId;

    document.getElementById('photoInput').addEventListener('input', e => {
      const val = e.target.value.trim();
      const preview = document.getElementById('photoPreview');
      const box = document.getElementById('photoPreviewBox');
      if (val) {
        preview.src = val;
        box.classList.remove('hidden');
      } else {
        box.classList.add('hidden');
      }
    });

    (async () => {
      const session = await initLayout();
      if (!session || session.userRole !== 'gestionnaire') {
        location.href = '/rooms';
        return;
      }

      if (isEdit) {
        document.getElementById('formTitle').textContent = 'Modifier la salle';
        document.getElementById('submitBtn').textContent = 'Enregistrer les modifications';
        document.getElementById('roomForm').action = `/rooms/manage/${roomId}/edit`;

        const res = await fetch(`/api/rooms/${roomId}`);
        if (!res.ok) { location.href = '/rooms'; return; }
        const room = await res.json();
        document.getElementById('nameInput').value = room.name;
        document.getElementById('capacityInput').value = room.capacity;
        document.getElementById('equipmentInput').value = room.equipment;
        document.getElementById('photoInput').value = room.photo_url;
        if (room.photo_url) {
          document.getElementById('photoPreview').src = room.photo_url;
          document.getElementById('photoPreviewBox').classList.remove('hidden');
        }
      } else {
        document.getElementById('roomForm').action = '/rooms/manage/new';
      }

      const errCode = new URLSearchParams(location.search).get('error');
      if (errCode === '1') {
        const box = document.getElementById('alertBox');
        box.className = 'alert alert-danger';
        box.textContent = '✗ Veuillez remplir les champs obligatoires.';
      }
    })();
  </script>
</body>
</html>
