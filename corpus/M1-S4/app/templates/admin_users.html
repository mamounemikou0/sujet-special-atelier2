{% extends 'base.html' %}{% block content %}<h1>Administration des utilisateurs</h1><section class="card"><h2>Créer un utilisateur</h2><form class="wide" method="post" action="/admin/users/create" enctype="multipart/form-data"><input name="first_name" placeholder="Prénom" required><input name="last_name" placeholder="Nom" required><input name="email" type="email" placeholder="Email" required><input name="password" type="password" placeholder="Mot de passe" required><select name="role">{% for r in roles %}<option>{{ r }}</option>{% endfor %}</select><input name="department" placeholder="Département" required><input name="salary" type="number" step="0.01" placeholder="Salaire" required><select name="manager_id"><option value="">Aucun manager</option>{% for m in managers %}<option value="{{ m.id }}">{{ m.full_name }}</option>{% endfor %}</select><input type="file" name="photo" accept="image/*"><button>Créer</button></form></section><section class="card"><h2>Tous les utilisateurs et salaires</h2><table><tr><th>Photo</th><th>Nom</th><th>Email</th><th>Rôle</th><th>Département</th><th>Salaire</th><th>Manager</th><th>Actions</th></tr>{% for u in users %}<tr><form method="post" action="/admin/users/{{ u.id }}/edit" enctype="multipart/form-data"><td>{% if u.profile_photo %}<img class="mini" src="{{ u.profile_photo }}">{% endif %}<input type="file" name="photo" accept="image/*"></td><td><input name="first_name" value="{{ u.first_name }}"><input name="last_name" value="{{ u.last_name }}"></td><td><input name="email" value="{{ u.email }}"></td><td><select name="role">{% for r in roles %}<option {% if u.role==r %}selected{% endif %}>{{ r }}</option>{% endfor %}</select></td><td><input name="department" value="{{ u.department }}"></td><td><input name="salary" type="number" step="0.01" value="{{ u.salary }}"></td><td><select name="manager_id"><option value="">Aucun</option>{% for m in managers %}<option value="{{ m.id }}" {% if u.manager_id==m.id %}selected{% endif %}>{{ m.full_name }}</option>{% endfor %}</select><input name="password" type="password" placeholder="Nouveau mdp"></td><td><button>Enregistrer</button></form><form method="post" action="/admin/users/{{ u.id }}/delete" onsubmit="return confirmDelete()"><button class="danger">Supprimer</button></form></td></tr>{% endfor %}</table></section>{% endblock %}
