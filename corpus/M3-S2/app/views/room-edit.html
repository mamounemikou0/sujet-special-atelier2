<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Modifier la salle</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="/">🏠 Accueil</a>
            <a href="/manager">📊 Gestion</a>
            <span class="user-info">Profil : <strong><%= user.email %></strong></span>
            <a href="/auth/logout" class="btn btn-small logout-btn">Déconnexion</a>
        </nav>
    </header>

    <main class="container">
        <h2>Mettre à jour les attributs de la salle : <%= room.name %></h2>
        <form action="/manager/rooms/edit/<%= room.id %>" method="POST" class="auth-form" style="max-width: 500px; background: white; padding: 2rem; border: 1px solid var(--border);">
            <div class="form-group">
                <label>Nom de la salle</label>
                <input type="text" name="name" value="<%= room.name %>" required>
            </div>
            <div class="form-group">
                <label>Capacité maximale</label>
                <input type="number" name="capacity" value="<%= room.capacity %>" required>
            </div>
            <div class="form-group">
                <label>Équipements</label>
                <input type="text" name="equipment" value="<%= room.equipment %>" required>
            </div>
            <div class="form-group">
                <label>URL de la photo d'illustration</label>
                <input type="url" name="photo_url" value="<%= room.photo_url %>" required>
            </div>
            <div style="margin-top: 1rem; display: flex; gap: 0.5rem;">
                <button type="submit" class="btn btn-success">Enregistrer</button>
                <a href="/manager" class="btn btn-secondary">Annuler</a>
            </div>
        </form>
    </main>
</body>
</html>
