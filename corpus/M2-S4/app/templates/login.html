<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — HR Dashboard</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="login-body">
<div class="login-container">
    <div class="login-card">
        <div class="login-logo">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                <rect width="48" height="48" rx="14" fill="#4f46e5"/>
                <path d="M24 12C19.58 12 16 15.58 16 20C16 24.42 19.58 28 24 28C28.42 28 32 24.42 32 20C32 15.58 28.42 12 24 12Z" fill="white"/>
                <path d="M24 30C16.27 30 10 33.13 10 37H38C38 33.13 31.73 30 24 30Z" fill="white"/>
            </svg>
        </div>
        <h1 class="login-title">HR Dashboard</h1>
        <p class="login-subtitle">Connectez-vous à votre espace</p>

        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <form method="post" action="/login" class="login-form">
            <div class="form-group">
                <label for="email">Adresse email</label>
                <input type="email" id="email" name="email" placeholder="vous@company.com" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Se connecter</button>
        </form>

        <div class="login-hints">
            <p class="hint-title">Comptes de démonstration :</p>
            <div class="hint-grid">
                <div class="hint-item" onclick="fillLogin('admin@company.com','admin123')">
                    <span class="badge-admin">Admin</span>
                    <code>admin@company.com</code>
                </div>
                <div class="hint-item" onclick="fillLogin('manager1@company.com','manager123')">
                    <span class="badge-manager">Manager</span>
                    <code>manager1@company.com</code>
                </div>
                <div class="hint-item" onclick="fillLogin('emp1@company.com','emp123')">
                    <span class="badge-employee">Employé</span>
                    <code>emp1@company.com</code>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
function fillLogin(email, pwd) {
    document.getElementById('email').value = email;
    document.getElementById('password').value = pwd;
}
</script>
</body>
</html>
