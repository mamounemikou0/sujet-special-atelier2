{% extends "base.html" %}

{% block content %}
<h2>Liste des salaires</h2>
<table>
    <thead>
        <tr>
            <th>Nom</th>
            <th>Email</th>
            <th>Rôle</th>
            <th>Département</th>
            <th>Salaire</th>
        </tr>
    </thead>
    <tbody>
        {% for u in users %}
        <tr>
            <td>{{ u.full_name }}</td>
            <td>{{ u.email }}</td>
            <td>{{ u.role.value }}</td>
            <td>{{ u.department.value }}</td>
            <td>{{ u.salary }} €</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
