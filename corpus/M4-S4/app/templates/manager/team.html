{% extends "base.html" %}

{% block content %}
<h2>Mon équipe</h2>
<table>
    <thead>
        <tr>
            <th>Nom</th>
            <th>Email</th>
            <th>Département</th>
            <th>Salaire</th>
        </tr>
    </thead>
    <tbody>
        {% for member in team %}
        <tr>
            <td>{{ member.full_name }}</td>
            <td>{{ member.email }}</td>
            <td>{{ member.department.value }}</td>
            <td>{{ member.salary }} €</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
