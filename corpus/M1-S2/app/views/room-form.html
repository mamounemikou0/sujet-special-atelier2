<section class="form-panel"><h1>{{heading}}</h1><form method="post" action="{{action}}" class="stack">{{csrf}}<label>Nom<input type="text" name="name" maxlength="80" value="{{name}}" required></label><label>Capacité<input type="number" name="capacity" min="1" value="{{capacity}}" required></label><label>Équipements<textarea name="equipment" maxlength="250" rows="3">{{equipment}}</textarea></label><label>URL de la photo<input type="url" name="photo_url" value="{{photoUrl}}" required></label><button>Enregistrer</button></form></section>
