{% extends "base.html" %}
{% block title %}Connexion - E-Boutique{% endblock %}
{% block content %}
<div style="display: flex; flex-direction: column; align-items: center; justify-content: center; margin-top: 4rem;">
    <h2>Connexion</h2>
    {% if error %}
        <p style="color: var(--danger); font-weight: bold;">{{ error }}</p>
    {% endif %}
    <form method="post" action="/auth/login">
        <div class="form-group">
            <label>Adresse Email</label>
            <input type="email" name="email" required placeholder="client@shop.com ou admin@shop.com">
        </div>
        <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" name="password" required placeholder="clientpassword ou adminpassword">
        </div>
        <button type="submit" class="btn">Se connecter</button>
        <p style="margin-top: 1rem; text-align: center;">Nouveau ? <a href="/auth/register">Créer un compte</a></p>
    </form>
</div>
{% endblock %}
