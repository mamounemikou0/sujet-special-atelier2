{% extends "base.html" %}
{% block title %}{% if product %}Modifier{% else %}Ajouter{% endif %} Produit{% endblock %}
{% block content %}
<h2>{% if product %}Modifier le produit #{{ product.id }}{% else %}Ajouter un produit au catalogue{% endif %}</h2>

<form method="post" action="{% if product %}/admin/product/edit/{{ product.id }}{% else %}/admin/product/add{% endif %}" style="margin-top: 2rem;">
    <div class="form-group">
        <label>Nom du produit</label>
        <input type="text" name="name" value="{{ product.name if product else '' }}" required>
    </div>
    <div class="form-group">
        <label>Catégorie</label>
        <input type="text" name="category" value="{{ product.category if product else '' }}" placeholder="Informatique, Cuisine, Mode..." required>
    </div>
    <div class="form-group">
        <label>Description</label>
        <textarea name="description" required rows="4">{% if product %}{{ product.description }}{% endif %}</textarea>
    </div>
    <div class="form-group">
        <label>Prix de vente (€)</label>
        <input type="number" name="price" step="0.01" min="0" value="{{ product.price if product else '0.00' }}" required>
    </div>
    <div class="form-group">
        <label>Quantité initiale en Stock</label>
        <input type="number" name="stock" min="0" value="{{ product.stock if product else '0' }}" required>
    </div>
    <div class="form-group">
        <label>URL de l'image de couverture</label>
        <input type="url" name="image_url" value="{{ product.image_url if product else '' }}" placeholder="https://images.unsplash.com/..." required>
    </div>
    
    <div style="display: flex; gap: 1rem; margin-top: 1rem;">
        <button type="submit" class="btn">Sauvegarder l'article</button>
        <a href="/admin" class="btn" style="background-color: #64748b;">Retour à l'accueil admin</a>
    </div>
</form>
{% endblock %}
