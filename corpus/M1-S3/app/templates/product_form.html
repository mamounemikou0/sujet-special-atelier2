{% extends 'base.html' %}{% block content %}<h1>{{ 'Modifier' if product else 'Ajouter' }} un produit</h1><form class="form" method="post" action="{{ action }}"><label>Nom<input name="name" value="{{ product.name if product else '' }}" required></label><label>Description<textarea name="description" required>{{ product.description if product else '' }}</textarea></label><label>Prix<input type="number" name="price" step="0.01" min="0" value="{{ product.price if product else '' }}" required></label><label>Stock<input type="number" name="stock" min="0" value="{{ product.stock if product else '' }}" required></label><label>Image URL<input name="image_url" value="{{ product.image_url if product else '' }}" required></label><label>Catégorie<input name="category_name" list="categories" value="{{ product.category.name if product else '' }}" required><datalist id="categories">{% for c in categories %}<option value="{{ c.name }}">{% endfor %}</datalist></label><button>Enregistrer</button></form>{% endblock %}
