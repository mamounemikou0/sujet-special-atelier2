{% extends "base.html" %}

{% block title %}Connexion{% endblock %}

{% block content %}
<h1>Connexion</h1>

{% if error %}
    <div class="alert alert-error">{{ error }}</div>
{% endif %}

<form method="post">
    <label>Email
        <input type="email" name="email" required>
    </label>

    <label>Mot de passe
        <input type="password" name="password" required>
    </label>

    <button type="submit">Se connecter</button>
</form>
{% endblock %}
